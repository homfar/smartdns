name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22'}
      - run: gofmt -w $(find . -name '*.go')
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/geodns
